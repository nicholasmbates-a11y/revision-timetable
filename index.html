<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0d12">
<title>Revision Timetable</title>
<style>
  body {
    margin: 0;
    background: #0b0d12;
    color: #e6e9f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .loader {
    text-align: center;
    max-width: 400px;
  }
  .loader-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .4; transform: scale(.95); }
    50%      { opacity: 1; transform: scale(1.05); }
  }
  .loader h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
    background: linear-gradient(120deg, #f97316, #38bdf8 50%, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .loader p {
    color: #8b93a8;
    font-size: 0.85rem;
    margin: 0 0 24px;
  }
  .manual-links {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #242938;
  }
  .manual-links.show { display: flex; }
  .manual-links small {
    color: #52596b;
    font-size: 0.7rem;
    margin-bottom: 4px;
  }
  .manual-link {
    display: inline-block;
    padding: 10px 18px;
    background: #181c25;
    border: 1px solid #2e3547;
    border-radius: 10px;
    color: #e6e9f0;
    text-decoration: none;
    font-size: 0.8rem;
    transition: border-color 0.15s;
  }
  .manual-link:hover { border-color: rgba(56,189,248,.4); }
  .manual-link.recommended {
    background: linear-gradient(135deg, rgba(56,189,248,.15), rgba(167,139,250,.15));
    border-color: rgba(56,189,248,.4);
  }
  .detected {
    display: inline-block;
    margin-top: 12px;
    font-size: 0.7rem;
    color: #52596b;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="loader">
  <div class="loader-icon">📚</div>
  <h1>Revision Timetable</h1>
  <p id="status">Detecting your device…</p>
  <div class="detected" id="detected"></div>

  <div class="manual-links" id="manualLinks">
    <small>Or pick manually:</small>
    <a class="manual-link" id="linkMobile" href="revision-timetable-mobile.html">📱 Open mobile version</a>
    <a class="manual-link" id="linkDesktop" href="revision-timetable.html">🖥 Open desktop version</a>
  </div>
</div>

<script>
(function() {
  // Detect device class
  const ua = navigator.userAgent || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/i.test(ua);
  const isMobileUA = /Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  const hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const smallScreen = Math.min(window.innerWidth, window.innerHeight) <= 820;

  // Decide: mobile if (mobile UA) OR (touch + small screen)
  const useMobile = isMobileUA || (hasTouch && smallScreen);

  let label = 'Desktop';
  if (isIOS) label = 'iOS';
  else if (isAndroid) label = 'Android';
  else if (useMobile) label = 'Mobile';

  const target = useMobile ? 'revision-timetable-mobile.html' : 'revision-timetable.html';

  document.getElementById('detected').textContent = `Detected: ${label}`;
  document.getElementById('status').textContent = `Loading the ${useMobile ? 'mobile' : 'desktop'} version…`;

  // Mark recommended link
  const recId = useMobile ? 'linkMobile' : 'linkDesktop';
  document.getElementById(recId).classList.add('recommended');

  // Allow ?force=desktop or ?force=mobile to override
  const forced = new URLSearchParams(location.search).get('force');
  let finalTarget = target;
  if (forced === 'desktop') finalTarget = 'revision-timetable.html';
  if (forced === 'mobile')  finalTarget = 'revision-timetable-mobile.html';

  // Show manual links after a short delay in case redirect fails
  setTimeout(() => {
    document.getElementById('manualLinks').classList.add('show');
  }, 800);

  // Redirect using replace() so back-button doesn't loop here
  setTimeout(() => {
    location.replace(finalTarget);
  }, 200);
})();
</script>
</body>
</html>
